<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flow Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app">
    <header>Flow Planner</header>

    <main>
      <div class="card">
        <h3>Welcome</h3>
        <p>Your app is working 🎉</p>
      </div>
    </main>

    <nav class="bottom-nav">
      <button data-tab="Home"><span class="nav-icon">⌂</span><span class="nav-label">Home</span></button>
      <button data-tab="Planner"><span class="nav-icon">◷</span><span class="nav-label">Planner</span></button>
      <button data-tab="Systems"><span class="nav-icon">⚡</span><span class="nav-label">Systems</span></button>
      <button data-tab="Social"><span class="nav-icon">◉</span><span class="nav-label">Social</span></button>
      <button data-tab="Settings"><span class="nav-icon">⚙</span><span class="nav-label">Settings</span></button>
    </nav>
  </div>

  <!-- Core app — must be first -->
  <script src="app.js"></script>

  <!--
    Enhanced Import / Export module.
    Must load AFTER app.js — it patches pages.Settings and adds import/export functions.
    Remove the two old files (import-export.js + import-export-ui.js) from your project;
    this single file replaces both.
  -->
  <script src="flow-import-export.js"></script>

</body>
</html>
